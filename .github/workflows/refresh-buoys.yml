name: Refresh buoy snapshot

on:
  schedule:
    # Every 30 min (Sofar Ocean buoys refresh ~30min, pas la peine d'aller plus vite)
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-buoys
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch buoy readings
        env:
          LABOUEE_API_KEY: ${{ secrets.LABOUEE_API_KEY }}
        run: |
          set -euo pipefail
          curl -sfS \
            -H "Authorization: Bearer $LABOUEE_API_KEY" \
            "https://thesurfkit.com/api/v2/buoys?near=12.0,-86.8&radius=1500&per_page=50" \
            > /tmp/buoys.json
          # Validate that we got a success payload before overwriting the file
          status=$(jq -r '.status // "missing"' /tmp/buoys.json)
          if [ "$status" != "success" ]; then
            echo "::error::API returned status=$status"
            cat /tmp/buoys.json
            exit 1
          fi
          count=$(jq -r '.data.buoys | length' /tmp/buoys.json)
          echo "Got $count buoys"
          {
            printf 'window.BUOY_SNAPSHOT = '
            cat /tmp/buoys.json
            printf ';\n'
          } > buoys-data.js

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add buoys-data.js
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
            exit 0
          fi
          git commit -m "chore: refresh buoy snapshot [skip ci]"
          git push
