const map = L.map('map', { zoomControl: true }).setView([12.0, -86.8], 8);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri', maxZoom: 18
}).addTo(map);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  opacity: 0.6, maxZoom: 18
}).addTo(map);

const regionLabel = { rivas: 'Rivas', leon: 'León', chinandega: 'Chinandega' };
const catLabel = { beach: 'Beach-break', mixte: 'Mixte', reef: 'Reef' };
const tideLabel = { basse: 'Basse', mi: 'Mi-marée', haute: 'Haute' };
const crowdLabelF = { basse: 'Fréq. basse', moyenne: 'Fréq. moyenne', haute: 'Fréq. haute' };
const accessLabelF = { facile: 'Accès facile', '4x4': '4x4 / piste', bateau: 'Bateau requis' };
const posLabel = {
  verified: '✓ Position vérifiée (source cartographique)',
  offshore: '~ Position calculée par offset depuis repère terrestre vérifié',
  approx:   '⚠️ Position approximative — source cartographique introuvable'
};

const routeCoords = spots.map(s => [s.lat, s.lon]);
const routeLine = L.polyline(routeCoords, { color: '#fff', weight:2, opacity:0.45, dashArray:'6,8' }).addTo(map);

// Build markers
const markers = spots.map(s => {
  const cls = 'marker-num ' + s.region + (s.posType === 'approx' ? ' unverified' : '');
  const icon = L.divIcon({
    className: 'marker-div',
    html: '<div class="' + cls + '">' + s.n + '</div>',
    iconSize: [28, 28], iconAnchor: [14, 14]
  });
  const sourcesHtml = s.sources.map(src => '<a href="' + src[1] + '" target="_blank">' + src[0] + '</a>').join(' · ');
  const posNote = s.posType !== 'verified' ? '<div class="warn">' + posLabel[s.posType] + '</div>' : '';
  const tags =
    '<span class="tag cat-' + s.cat + '">' + catLabel[s.cat] + '</span>' +
    '<span class="tag">' + tideLabel[s.tideF] + '</span>' +
    '<span class="tag">' + crowdLabelF[s.crowdF] + '</span>' +
    '<span class="tag">' + accessLabelF[s.accessF] + '</span>';
  const popup = '<div class="popup">' +
    '<h3>' + s.n + '. ' + s.name + '</h3>' +
    '<div class="sub">' + regionLabel[s.region] + ' · ' + s.type + '</div>' +
    '<div class="tags">' + tags + '</div>' +
    posNote +
    '<div class="row"><span class="label">📏 Taille :</span> ' + s.size + '</div>' +
    '<div class="row"><span class="label">🌊 Marée :</span> ' + s.tide + '</div>' +
    '<div class="row"><span class="label">🏄 Vague :</span> ' + s.desc + '</div>' +
    '<div class="row"><span class="label">🚗 Accès :</span> ' + s.access + '</div>' +
    '<div class="row"><span class="label">👥 Fréquentation :</span> ' + s.crowd + '</div>' +
    '<div class="row"><span class="label">🛏 Hébergements :</span> ' + s.lodging + '</div>' +
    '<div class="sources"><strong>Sources :</strong> ' + sourcesHtml + '</div>' +
    '</div>';
  const m = L.marker([s.lat, s.lon], { icon }).bindPopup(popup, { maxWidth: 360 });
  m.spot = s;
  m.addTo(map);
  return m;
});

map.fitBounds(L.latLngBounds(routeCoords).pad(0.1));

// === FILTER LOGIC ===
const filterEls = Array.from(document.querySelectorAll('.f'));
const visibleCountEl = document.getElementById('visibleCount');
const visibleCountPanelEl = document.getElementById('visibleCountPanel');

function getFilters() {
  const f = { cat:[], tideF:[], crowdF:[], accessF:[] };
  filterEls.forEach(el => { if (el.checked) f[el.dataset.k].push(el.value); });
  return f;
}

function applyFilters() {
  const f = getFilters();
  const visibleLatLngs = [];
  let n = 0;
  markers.forEach(m => {
    const s = m.spot;
    const keep =
      f.cat.includes(s.cat) &&
      f.tideF.includes(s.tideF) &&
      f.crowdF.includes(s.crowdF) &&
      f.accessF.includes(s.accessF);
    if (keep) {
      if (!map.hasLayer(m)) m.addTo(map);
      visibleLatLngs.push([s.lat, s.lon]);
      n++;
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
  // Update route line to only connect visible spots
  routeLine.setLatLngs(visibleLatLngs);
  visibleCountEl.textContent = '(' + n + ')';
  visibleCountPanelEl.textContent = n;
}

function updateCounts() {
  ['cat','tideF','crowdF','accessF'].forEach(k => {
    const values = [...new Set(spots.map(s => s[k]))];
    values.forEach(v => {
      const el = document.getElementById('c-' + k + '-' + v);
      if (el) el.textContent = spots.filter(s => s[k] === v).length;
    });
  });
}

filterEls.forEach(el => el.addEventListener('change', applyFilters));
document.getElementById('resetBtn').addEventListener('click', () => {
  filterEls.forEach(el => el.checked = true);
  applyFilters();
});
document.getElementById('filterToggle').addEventListener('click', () => {
  document.getElementById('filterPanel').classList.toggle('open');
});

updateCounts();
applyFilters();
}
